name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Thanks for opening your first issue! We'll take a look as soon as we can. This is a side project, so please allow some time for a response."
          pr-message: "Thanks for your first pull request! We appreciate the contribution. A maintainer will review it when available."
