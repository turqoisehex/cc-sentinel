name: Bug Report
description: Report something that isn't working correctly
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run install.sh with modules X, Y
        2. Open a Claude Code session
        3. Trigger hook by...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Platform, shell, Claude Code version
      placeholder: |
        - OS: macOS 15 / Windows 11 / Ubuntu 24.04
        - Shell: bash 5.x / zsh 5.x / Git Bash
        - Claude Code version: X.Y.Z
        - cc-sentinel modules installed: core, verification, ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant error output
      render: shell
    validations:
      required: false
